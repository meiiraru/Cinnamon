name: Package & Publish Release Bundles

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Package for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Package Application (Linux)
        if: matrix.platform == 'linux'
        run: |
          chmod +x ./gradlew
          ./gradlew packageApp

      - name: Package Application (Windows)
        if: matrix.platform == 'windows'
        run: .\gradlew.bat packageApp

      - name: Zip Bundle (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build/dist
          zip -r ../../Cinnamon-${{ github.ref_name }}-${{ matrix.platform }}.zip *

      - name: Zip Bundle (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/dist
          Compress-Archive -Path * -DestinationPath ..\..\Cinnamon-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Attach Zip to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: Cinnamon-${{ github.ref_name }}-${{ matrix.platform }}.zip
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
